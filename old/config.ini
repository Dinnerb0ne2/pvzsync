[General]
# 是否允许随动打开PVZ（1=允许，0=禁止）
AllowAutoOpen=1
# 本机角色（server/client，两台电脑分别设置）
Role=server
# 对方内网IP
PeerIP=192.168.1.105
# 通信端口
PeerPort=8888
# PVZ程序路径
PVZPath=C:\Program Files\PlantsVsZombies\PlantsVsZombies.exe
# PVZ存档路径（默认路径，需根据实际修改）
SaveFilePath=C:\Users\你的用户名\AppData\Roaming\PopCap Games\PlantsVsZombies\userdata
# 本地备份路径
LocalBackupPath=C:\PVZBackup\Local
# 远程备份路径（对方电脑的备份路径）
RemoteBackupPath=C:\PVZBackup\Remote